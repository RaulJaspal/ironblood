<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>pose test</title>
<style>body{margin:0;background:#202028}</style>
<script type="importmap">
{ "imports": { "three": "../vendor/three.module.js", "three/addons/": "../vendor/addons/" } }
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const params = new URLSearchParams(location.search);
const char = params.get('char') || 'brawler';
const clipName = params.get('clip') || 'guard';
const t = parseFloat(params.get('t') || '0');
const view = params.get('view') || 'front'; // front | side | three-quarter
const gender = params.get('gender') || (char.includes('heroine') || char.includes('_f') ? 'female' : 'male');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x28282f);
const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 50);

scene.add(new THREE.HemisphereLight(0xffffff, 0x445566, 1.2));
const key = new THREE.DirectionalLight(0xffffff, 2.2); key.position.set(2, 3, 4); scene.add(key);
const rim = new THREE.DirectionalLight(0x88aaff, 1.0); rim.position.set(-3, 2, -2); scene.add(rim);
scene.add(new THREE.GridHelper(4, 8, 0x555555, 0x333340));

const loader = new GLTFLoader();
const [charGltf, animGltf] = await Promise.all([
  loader.loadAsync(`../assets/characters/${char}.glb`),
  loader.loadAsync(`../assets/anims/anims_${gender}.glb`),
]);

const model = charGltf.scene;
scene.add(model);

// report bounding info + clip list for debugging
const box = new THREE.Box3().setFromObject(model);
window.__info = {
  bbox: { min: box.min.toArray(), max: box.max.toArray() },
  clips: animGltf.animations.map((c) => ({ name: c.name, duration: +c.duration.toFixed(2) })),
  nodes: [],
};
model.traverse((o) => { if (o.isBone && window.__info.nodes.length < 5) window.__info.nodes.push(o.name); });

const mixer = new THREE.AnimationMixer(model);
const clip = animGltf.animations.find((c) => c.name === clipName);
if (clip) {
  const action = mixer.clipAction(clip);
  action.play();
  mixer.update(0);
  mixer.update(Math.min(t, clip.duration - 1e-4));
} else {
  window.__info.error = 'clip not found: ' + clipName;
}

// frame the character
const box2 = new THREE.Box3().setFromObject(model);
const c = box2.getCenter(new THREE.Vector3());
const size = box2.getSize(new THREE.Vector3());
const dist = Math.max(size.y, size.x, 1.2) * 1.9;
if (view === 'side') camera.position.set(c.x + dist, c.y + 0.15, c.z);
else if (view === 'three-quarter') camera.position.set(c.x + dist * 0.7, c.y + 0.35, c.z + dist * 0.75);
else camera.position.set(c.x, c.y + 0.1, c.z + dist);
camera.lookAt(c);

renderer.render(scene, camera);
window.__ready = true;
</script>
</body>
</html>
